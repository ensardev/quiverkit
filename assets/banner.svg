<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#fbbf24" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12100e"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow)"/>

  <!-- Logo mark + wordmark, centred as one row around y=170 -->
  <g transform="translate(376 112)">
    <!-- arrows in a quiver, scaled up from the 64px icon and nudged to sit on
         the wordmark's cap height -->
    <g transform="translate(-8 2) scale(1.85)">
      <g stroke="#fbbf24" stroke-width="5" stroke-linecap="round">
        <path d="M20 46V26"/>
        <path d="M32 46V18"/>
        <path d="M44 46V30"/>
      </g>
      <g fill="#fbbf24">
        <path d="M20 14l6 10H14z"/>
        <path d="M32 6l6 10H26z"/>
        <path d="M44 18l6 10H38z"/>
      </g>
    </g>
    <text x="120" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="700"
          letter-spacing="-1" fill="#fafaf9">Quiver<tspan fill="#fbbf24">Kit</tspan></text>
  </g>

  <text x="640" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="27" fill="#a8a29e">Developer tools that never leave your machine.</text>

  <!-- feature chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#d6d3d1">
    <g transform="translate(430 300)">
      <rect width="128" height="42" rx="21" fill="#1c1917" stroke="#292524"/>
      <circle cx="24" cy="21" r="4.5" fill="#fbbf24"/>
      <text x="40" y="28">62 tools</text>
    </g>
    <g transform="translate(570 300)">
      <rect width="118" height="42" rx="21" fill="#1c1917" stroke="#292524"/>
      <circle cx="24" cy="21" r="4.5" fill="#fbbf24"/>
      <text x="40" y="28">offline</text>
    </g>
    <g transform="translate(700 300)">
      <rect width="150" height="42" rx="21" fill="#1c1917" stroke="#292524"/>
      <circle cx="24" cy="21" r="4.5" fill="#fbbf24"/>
      <text x="40" y="28">no account</text>
    </g>
  </g>
</svg>
