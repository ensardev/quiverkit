<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>QuiverKit — developer tools that never leave your browser</title>
    <meta
      name="description"
      content="Base64, JWT, hashes, colour, cron and 60 more tools. Everything runs on your own machine — no upload, no account, no tracking."
    />

    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0c0a09" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QuiverKit" />
    <meta property="og:url" content="https://quiverkit.dev/" />
    <meta property="og:title" content="QuiverKit — developer tools that never leave your browser" />
    <meta
      property="og:description"
      content="60+ tools running entirely on your own machine. No upload, no account, no tracking."
    />
    <meta property="og:image" content="https://quiverkit.dev/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="QuiverKit — developer tools that never leave your browser" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QuiverKit — developer tools that never leave your browser" />
    <meta
      name="twitter:description"
      content="60+ tools running entirely on your own machine. No upload, no account, no tracking."
    />
    <meta name="twitter:image" content="https://quiverkit.dev/og.png" />

    <script>
      // Applied before first paint so a dark-mode user never sees a white flash.
      const stored = localStorage.getItem('quiverkit.theme')
      // Retro was replaced by dim. Anyone still carrying the old preference is
      // moved across here rather than silently dropped back to light.
      const migrated = stored === 'retro' ? 'dim' : stored
      if (migrated !== stored) localStorage.setItem('quiverkit.theme', migrated)
      const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches
      document.documentElement.dataset.theme = migrated ?? (prefersDark ? 'dark' : 'light')
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
